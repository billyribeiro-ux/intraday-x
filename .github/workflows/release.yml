name: Release

# Build, sign, and publish the intraday-x desktop app + auto-updater artifacts
# whenever a version tag (v*) is pushed.
#
# The updater needs SIGNED artifacts. tauri-action signs the bundle and emits
# `latest.json` (the updater manifest) into the GitHub Release. The app's
# `plugins.updater.endpoints` in tauri.conf.json points at that file's
# `releases/latest/download/latest.json` URL.
#
# REQUIRED repo secrets (Settings -> Secrets and variables -> Actions):
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.intradayx/updater.key
#                                         (the PRIVATE key from `tauri signer
#                                         generate`; NEVER commit it).
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — the password chosen when generating
#                                         that key (empty string if none).
#   APPLE_CERTIFICATE                   — base64-encoded .p12 developer certificate.
#   APPLE_CERTIFICATE_PASSWORD          — password for the above .p12.
#   APPLE_ID                            — Apple ID for notarization.
#   APPLE_PASSWORD                      — app-specific password for notarization.
#   APPLE_TEAM_ID                       — Apple Developer Team ID.
# GITHUB_TOKEN is provided automatically by Actions; it only needs the
# `contents: write` permission granted below to create/upload the Release.

on:
  push:
    tags:
      - 'v*'
    # Pushing a `release/*` branch cuts a release too — the trigger lives in the
    # pushed ref's own workflow file, so this needs no tag-push rights and no
    # `actions: write` dispatch permission. tauri-action creates the tag (derived
    # from src-tauri/tauri.conf.json's version) + release at the pushed commit.
    branches:
      - 'release/**'
  # Manual trigger: lets the macOS build be cut from the Actions UI/API with a
  # tag input, in addition to the two push triggers above.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.0.2)'
        required: true
        default: 'v0.0.2'

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon runner — matches the aarch64-apple-darwin sidecar triple.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"          # manual dispatch
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"                  # v* tag push
          else
            tag="v$(jq -r .version src-tauri/tauri.conf.json)"  # release/* branch push
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Detect updater signing
        id: signing
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY not set — building an UNSIGNED app (no auto-update artifacts). Add the signing secrets to emit latest.json."
          fi

      - name: Detect Apple code-signing
        id: apple
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # tauri-action runs `security import` on APPLE_CERTIFICATE; if the secret
          # isn't a valid base64 .p12 (or the password is wrong) the whole bundle
          # fails. Mirror that import into a throwaway keychain FIRST: if it works
          # signing will work, otherwise fall back to an UNSIGNED (still installable)
          # build instead of failing the release.
          ok=false
          # openssl base64 -d -A is portable (BSD `base64 --decode` is unreliable)
          # and -A tolerates the single-line, newline-free secret form.
          if [ -n "$APPLE_CERTIFICATE" ] && \
             printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$RUNNER_TEMP/cert.p12" 2>/dev/null && \
             [ -s "$RUNNER_TEMP/cert.p12" ]; then
            kc="$RUNNER_TEMP/validate.keychain"
            security create-keychain -p tmp-pass "$kc" 2>/dev/null || true
            if security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" \
                 -T /usr/bin/codesign >/dev/null 2>&1; then
              ok=true
            else
              echo "::warning::APPLE_CERTIFICATE failed to import (not a valid base64 .p12, or wrong APPLE_CERTIFICATE_PASSWORD) — building an UNSIGNED app. Re-set the secret with 'base64 -i YourCert.p12' to get a signed/notarized build."
            fi
            security delete-keychain "$kc" 2>/dev/null || true
          elif [ -n "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE is not valid base64 — building an UNSIGNED app."
          else
            echo "::notice::No APPLE_CERTIFICATE set — building an UNSIGNED app (open via right-click → Open)."
          fi
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "enabled=$ok" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Python engine sidecar
        run: bash backend/scripts/build_sidecar.sh

      # Two build paths. tauri-action attempts `security import` whenever
      # APPLE_CERTIFICATE is merely PRESENT in the env (even empty), so the only
      # reliable way to skip codesigning is to not define the Apple env vars at
      # all. The signed path runs only when the cert validated above; otherwise
      # the unsigned path runs with zero Apple env and still ships an installable
      # (unsigned) .app/.dmg.
      - name: Build + publish (signed + notarized)
        if: steps.apple.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: 'intraday-x ${{ steps.ver.outputs.tag }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: ${{ steps.signing.outputs.enabled }}
          args: --target aarch64-apple-darwin

      - name: Build + publish (unsigned)
        if: steps.apple.outputs.enabled != 'true'
        uses: tauri-apps/tauri-action@v0
        # NO Apple env vars here — their mere presence makes tauri-action try
        # codesigning. Omitting them is what lets the unsigned build succeed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: 'intraday-x ${{ steps.ver.outputs.tag }}'
          releaseBody: 'See the assets below to download and install this version. (Unsigned build — on first open use right-click → Open.)'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: ${{ steps.signing.outputs.enabled }}
          args: --target aarch64-apple-darwin
